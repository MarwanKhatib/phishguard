version: "3.9"

services:
  web:
    build: .
    command: gunicorn phishshield.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: phishshield.settings

  worker:
    build: .
    command: celery -A phishshield worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: phishshield.settings

  beat:
    build: .
    command: celery -A phishshield beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    environment:
      DJANGO_SETTINGS_MODULE: phishshield.settings

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: phishshield
      POSTGRES_USER: phishshield
      POSTGRES_PASSWORD: phishshield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

